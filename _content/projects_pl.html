{% extends "base_pl.html" %}
{% block content %}

{% for project in data.projects %}

<div class="contentitem">
	<div class="contenttitle">
	{{project.namepl}}
	</div>

	<div class="contentsubtitle">{{project.role|pl}}, {{project.year}}</div>

	<div class="contentbody">
		<p>
		{{project.descriptionpl}}
		</p>
	</div>

	{% if project.more is defined %}
	<div class="contentactions"><a href="{{project.more}}">More</a></div>
	{% endif %}
</div>
{% endfor %}

{% endblock %}
