{% extends "base.html" %}
{% block content %}

{% for subject in data.classes %}
<div class="contentitem">
	<div class="contenttitle">
        {{subject.name}}
	</div>

	<div class="contentbody">
        {% for hour in subject.hours %}
            <p> {{hour}} </p>
        {% endfor %}
	</div>

    {% if subject.more %}
    <div class="contentactions"><a href="{{subject.more}}">More (in Polish)</a></div>
    {% endif %}
</div>
{% endfor %}

{% endblock %}
