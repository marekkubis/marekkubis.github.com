{% extends "base_pl.html" %}
{% block content %}

{% for subject in data.classes %}
<div class="contentitem">
	<div class="contenttitle">
        {{subject.name|pl}}
	</div>

	<div class="contentbody">
        {% for hour in subject.hours %}
            <p> {{hour|pl}} </p>
        {% endfor %}
	</div>

    <div class="contentactions"><a href="{{subject.more}}">Szczegóły</a></div>
</div>
{% endfor %}

{% endblock %}
